<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>兔子的窝</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
--cream: #faf7f2;
--cream2: #f5f0e8;
--pink: #f2c4ce;
--pink-light: #fce8ed;
--pink-deep: #e8a0b0;
--text: #5c4a4a;
--text-light: #9a7e7e;
--dot: #f0b8c5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(--cream);
font-family: 'Nunito', 'PingFang SC', sans-serif;
color: var(--text);
min-height: 100vh;
position: relative;
overflow-x: hidden;
}

/* polka dot background */
body::before {
content: '';
position: fixed;
inset: 0;
background-image: radial-gradient(circle, var(--dot) 2px, transparent 2px);
background-size: 32px 32px;
opacity: 0.35;
pointer-events: none;
z-index: 0;
}

.wrap {
position: relative;
z-index: 1;
max-width: 860px;
margin: 0 auto;
padding: 0 24px 80px;
}

/* ── HEADER ── */
header {
text-align: center;
padding: 60px 0 40px;
}

.logo {
font-family: 'Noto Serif SC', serif;
font-size: 2.6rem;
font-weight: 300;
letter-spacing: 0.15em;
color: var(--text);
}

.tagline {
margin-top: 10px;
font-size: 0.92rem;
color: var(--text-light);
letter-spacing: 0.08em;
}

/* ── NAV ── */
nav {
display: flex;
justify-content: center;
flex-wrap: wrap;
gap: 10px;
margin: 24px 0 48px;
}

nav a {
text-decoration: none;
padding: 7px 20px;
border-radius: 999px;
font-size: 0.88rem;
color: var(--text);
background: var(--pink-light);
border: 1.5px solid var(--pink);
transition: all 0.2s;
cursor: pointer;
}

nav a:hover, nav a.active {
background: var(--pink);
color: #fff;
}

/* ── SPONSOR CARD ── */
.sponsor {
background: white;
border-radius: 24px;
padding: 32px;
display: flex;
align-items: center;
gap: 28px;
margin-bottom: 36px;
box-shadow: 0 4px 24px rgba(242,196,206,0.25);
border: 1.5px solid var(--pink-light);
}

.sponsor img {
width: 110px;
height: 110px;
border-radius: 50%;
object-fit: cover;
border: 3px solid var(--pink);
flex-shrink: 0;
}

.sponsor-text .label {
font-size: 0.75rem;
color: var(--text-light);
letter-spacing: 0.1em;
text-transform: uppercase;
margin-bottom: 4px;
}

.sponsor-text h2 {
font-size: 1.4rem;
font-weight: 600;
color: var(--text);
}

.sponsor-text p {
margin-top: 8px;
font-size: 0.88rem;
color: var(--text-light);
line-height: 1.6;
}

/* ── SECTIONS ── */
.section { display: none; }
.section.active { display: block; }

.section-title {
font-family: 'Noto Serif SC', serif;
font-size: 1.3rem;
font-weight: 300;
color: var(--text);
margin-bottom: 20px;
padding-bottom: 10px;
border-bottom: 1.5px solid var(--pink-light);
}

/* ── CARD ── */
.card {
background: white;
border-radius: 20px;
padding: 24px 28px;
margin-bottom: 16px;
box-shadow: 0 2px 16px rgba(242,196,206,0.18);
border: 1.5px solid var(--pink-light);
}

.card .date {
font-size: 0.78rem;
color: var(--text-light);
margin-bottom: 8px;
}

.card .content {
font-size: 0.95rem;
line-height: 1.8;
color: var(--text);
}

.special-day-banner {
border-color: var(--pink-deep) !important;
background: linear-gradient(145deg, #fffefb 0%, #fff5f8 100%);
box-shadow: 0 4px 20px rgba(232, 160, 176, 0.22);
}

.special-day-banner .date {
color: var(--pink-deep);
font-weight: 500;
letter-spacing: 0.06em;
}

/* ── 5月13日 · 兔子生日（来自 A.txt 适配）── */
#birthday-banner {
display: none;
background: linear-gradient(135deg, #fce8ed 0%, #fff0f5 50%, #fce8ed 100%);
border: 2px solid var(--pink);
border-radius: 24px;
margin-bottom: 24px;
overflow: hidden;
animation: fadeIn 0.6s ease;
box-shadow: 0 4px 32px rgba(242,196,206,0.4);
}

#birthday-banner .bday-inner {
padding: 28px;
text-align: center;
}

#birthday-banner .bday-confetti {
font-size: 1.4rem;
letter-spacing: 0.3em;
animation: bdayFloat 3s ease-in-out infinite;
}

#birthday-banner .bday-inner > .bday-confetti:last-of-type {
animation-delay: 0.15s;
}

#birthday-banner .bday-text {
font-family: 'Noto Serif SC', serif;
font-size: 1.8rem;
font-weight: 300;
color: var(--text);
margin: 12px 0 8px;
letter-spacing: 0.15em;
}

#birthday-banner .bday-sub {
font-size: 0.88rem;
color: var(--text-light);
letter-spacing: 0.08em;
}

.birthday-banner-knot {
border: 2px solid var(--pink) !important;
border-radius: 20px !important;
background: linear-gradient(135deg, #fce8ed 0%, #fff0f5 100%) !important;
text-align: center;
padding: 16px 20px !important;
margin-bottom: 16px;
box-shadow: 0 4px 24px rgba(242,196,206,0.28);
}

.birthday-banner-knot .bday-confetti {
font-size: 1.1rem;
letter-spacing: 0.25em;
animation: bdayFloat 3s ease-in-out infinite;
}

.birthday-banner-knot .bday-text {
font-family: 'Noto Serif SC', serif;
font-size: 1.2rem;
font-weight: 300;
color: var(--text);
margin: 8px 0 4px;
letter-spacing: 0.12em;
}

body.rabbit-birthday-mode {
--dot: #f5c2cf;
}

body.rabbit-birthday-mode::before {
opacity: 0.42;
}

@keyframes bdayFloat {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-4px); }
}

/* ── INPUT AREA ── */
.input-area {
background: white;
border-radius: 20px;
padding: 24px;
margin-bottom: 24px;
border: 1.5px solid var(--pink);
box-shadow: 0 2px 16px rgba(242,196,206,0.2);
}

.input-area textarea {
width: 100%;
border: none;
outline: none;
resize: none;
font-family: 'Nunito', sans-serif;
font-size: 0.95rem;
color: var(--text);
background: transparent;
line-height: 1.8;
min-height: 100px;
}

.input-area textarea::placeholder { color: var(--text-light); }

.input-footer {
display: flex;
justify-content: space-between;
align-items: center;
margin-top: 12px;
}

.input-footer .hint {
font-size: 0.8rem;
color: var(--text-light);
}

.btn {
background: var(--pink);
color: white;
border: none;
border-radius: 999px;
padding: 8px 24px;
font-family: 'Nunito', sans-serif;
font-size: 0.88rem;
cursor: pointer;
transition: background 0.2s;
}

.btn:hover { background: var(--pink-deep); }

/* ── MOOD ── */
.mood-grid {
display: flex;
gap: 12px;
flex-wrap: wrap;
margin-bottom: 24px;
}

.mood-btn {
background: var(--pink-light);
border: 1.5px solid var(--pink);
border-radius: 999px;
padding: 8px 18px;
font-size: 1rem;
cursor: pointer;
transition: all 0.2s;
font-family: 'Nunito', sans-serif;
color: var(--text);
}

.mood-btn:hover, .mood-btn.selected {
background: var(--pink);
color: white;
}

/* ── GARDEN ── */
.garden-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
gap: 16px;
margin-bottom: 24px;
}

.flower-card {
background: white;
border-radius: 20px;
padding: 20px;
text-align: center;
border: 1.5px solid var(--pink-light);
box-shadow: 0 2px 12px rgba(242,196,206,0.15);
}

.flower-card .emoji { font-size: 2rem; margin-bottom: 8px; }
.flower-card .name { font-size: 0.9rem; font-weight: 600; color: var(--text); }
.flower-card .status { font-size: 0.78rem; color: var(--text-light); margin-top: 4px; }

/* ── WISHLIST ── */
.wish-item {
display: flex;
align-items: flex-start;
gap: 14px;
padding: 16px 0;
border-bottom: 1px solid var(--pink-light);
}

.wish-item:last-child { border-bottom: none; }

.wish-check {
width: 20px;
height: 20px;
border-radius: 50%;
border: 2px solid var(--pink);
flex-shrink: 0;
margin-top: 2px;
cursor: pointer;
transition: all 0.2s;
display: flex;
align-items: center;
justify-content: center;
}

.wish-check.done {
background: var(--pink);
}

.wish-check.done::after {
content: '✓';
color: white;
font-size: 0.7rem;
}

.wish-text { font-size: 0.95rem; line-height: 1.6; }
.wish-text.done { text-decoration: line-through; color: var(--text-light); }

/* ── EMPTY STATE ── */
.empty {
text-align: center;
padding: 48px 0;
color: var(--text-light);
font-size: 0.9rem;
}

.empty .emoji { font-size: 2.5rem; margin-bottom: 12px; }

/* ── ANIMATION ── */
@keyframes fadeIn {
from { opacity: 0; transform: translateY(12px); }
to { opacity: 1; transform: translateY(0); }
}

.card, .sponsor, .input-area { animation: fadeIn 0.4s ease; }

/* ── GARDEN CANVAS ── */
.garden-canvas-wrap {
background: #e8f4e8;
border: 3px solid #c8b8a2;
border-radius: 14px;
box-shadow: 4px 4px 0 #c8b8a2;
overflow: hidden;
margin-bottom: 24px;
}

.garden-canvas-wrap canvas {
display: block;
image-rendering: pixelated;
width: 100%;
height: auto;
}

.garden-canvas-title {
text-align: center;
padding: 8px;
background: #f5e6d8;
border-bottom: 2px solid #c8b8a2;
font-size: 13px;
color: #8a6a5a;
letter-spacing: 2px;
font-family: monospace;
}

.garden-canvas-footer {
text-align: center;
padding: 6px;
background: #f5e6d8;
border-top: 2px solid #c8b8a2;
font-size: 11px;
color: #b09080;
letter-spacing: 1px;
}
</style>

</head>
<body>
<div class="wrap">

<header>
<div class="logo">兔子的窝</div>
<div class="tagline">一个软软的、安静的地方 ♡</div>
</header>

</nav>

<script>
// ── NAV ──
function show(id, el) {
document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
document.getElementById(id).classList.add('active');
el.classList.add('active');
applyBirthdayPageEffects();
if (id === 'home') loadSpecialDayForHome();
}

// ── DATE ──
function today() {
return new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
}
document.getElementById('diary-date').textContent = today();

// ── STORAGE ──
function load(key) { try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; } }
function save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

// ── DIARY ──
function saveDiary() {
const txt = document.getElementById('diary-input').value.trim();
if (!txt) return;
const entries = load('diary');
entries.unshift({ date: today(), content: txt });
save('diary', entries);
document.getElementById('diary-input').value = '';
renderDiary();
}

function renderDiary() {
const list = document.getElementById('diary-list');
const entries = load('diary');
if (!entries.length) { list.innerHTML = '<div class="empty"><div class="emoji">📖</div>还没有日记，今天写一篇？</div>'; return; }
list.innerHTML = entries.map(e => `
<div class="card">
<div class="date">${e.date}</div>
<div class="content">${e.content.replace(/\n/g,'<br>')}</div>
</div>`).join('');
}

// ── BOOKS ──
function saveBook() {
const txt = document.getElementById('book-input').value.trim();
if (!txt) return;
const src = document.getElementById('book-source').value.trim();
const entries = load('books');
entries.unshift({ date: today(), content: txt, source: src });
save('books', entries);
document.getElementById('book-input').value = '';
document.getElementById('book-source').value = '';
renderBooks();
}

function renderBooks() {
const list = document.getElementById('book-list');
const entries = load('books');
if (!entries.length) { list.innerHTML = '<div class="empty"><div class="emoji">📚</div>摘录一句打动你的话</div>'; return; }
list.innerHTML = entries.map(e => `
<div class="card">
<div class="date">${e.date}${e.source ? ' · ' + e.source : ''}</div>
<div class="content">${e.content.replace(/\n/g,'<br>')}</div>
</div>`).join('');
}

// ── MOOD ──
let selectedMood = '';
function selectMood(btn, mood) {
document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
btn.classList.add('selected');
selectedMood = mood;
document.getElementById('mood-selected').textContent = mood;
}

function saveMood() {
if (!selectedMood) return;
const txt = document.getElementById('mood-input').value.trim();
const entries = load('mood');
entries.unshift({ date: today(), mood: selectedMood, content: txt });
save('mood', entries);
document.getElementById('mood-input').value = '';
document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
selectedMood = '';
document.getElementById('mood-selected').textContent = '';
renderMood();
}

function renderMood() {
const list = document.getElementById('mood-list');
const entries = load('mood');
if (!entries.length) { list.innerHTML = '<div class="empty"><div class="emoji">🌸</div>今天感觉怎么样？</div>'; return; }
list.innerHTML = entries.map(e => `
<div class="card">
<div class="date">${e.date} · ${e.mood}</div>
${e.content ? '<div class="content">' + e.content.replace(/\n/g,'<br>') + '</div>' : ''}
</div>`).join('');
}

// ── WISHES ──
function saveWish() {
const txt = document.getElementById('wish-input').value.trim();
if (!txt) return;
const entries = load('wishes');
entries.push({ text: txt, done: false });
save('wishes', entries);
document.getElementById('wish-input').value = '';
renderWishes();
}

function toggleWish(i) {
const entries = load('wishes');
entries[i].done = !entries[i].done;
save('wishes', entries);
renderWishes();
}

function renderWishes() {
const list = document.getElementById('wish-list');
const entries = load('wishes');
if (!entries.length) { list.innerHTML = '<div class="empty" style="padding:24px 0"><div class="emoji">✨</div>有什么想做的事？</div>'; return; }

function isRabbitBirthday() {
const n = new Date();
return n.getMonth() === 4 && n.getDate() === 13;
}

function applyBirthdayPageEffects() {
const b = document.getElementById('birthday-banner');
if (isRabbitBirthday()) {
document.body.classList.add('rabbit-birthday-mode');
if (b) b.style.display = 'block';
} else {
document.body.classList.remove('rabbit-birthday-mode');
if (b) b.style.display = 'none';
}
}

function escHTML(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

async function loadSpecialDayForHome() {
  const banner = document.getElementById('special-day-banner');
  const label = document.getElementById('special-day-label');
  const msg = document.getElementById('special-day-message');
  if (!banner || !label || !msg) return;
  try {
    const res = await fetch('http://localhost:8765/knot.json');
    if (!res.ok) throw new Error();
    const d = await res.json();
    const s = d.special_today;
    if (s && (s.home || s.label)) {
      label.textContent = s.label || '今天是特别的一天';
      msg.innerHTML = escHTML(s.home || '').replace(/\n/g, '<br>');
      banner.style.display = 'block';
    } else {
      banner.style.display = 'none';
    }
  } catch {
    banner.style.display = 'none';
  }
}

async function loadKnot() {
  const el = document.getElementById('knot-content');
  el.innerHTML = '<div class="empty"><div class="emoji">⏳</div>连接中…</div>';
  try {
    const res = await fetch('http://localhost:8765/knot.json');
    if (!res.ok) throw new Error();
    const d = await res.json();
    renderKnot(d);
  } catch {
    el.innerHTML = '<div class="empty"><div class="emoji">🔌</div>脚本还没跑起来，先启动 knot_day.py</div>';
  }
}

function periodLabel(p) {
  const map = { morning:'上午', noon:'午休', afternoon:'下午', evening:'傍晚', night:'深夜' };
  return map[p] || p;
}

function renderKnot(d) {
  const el = document.getElementById('knot-content');
  let html = '';

  if (isRabbitBirthday()) {
    html += `<div class="card birthday-banner-knot">
      <div class="bday-confetti">🎂✨🐇💕🎈</div>
      <div class="bday-text">生日快乐，兔子</div>
      <div class="bday-sub" style="font-size:0.82rem;color:var(--text-light);letter-spacing:0.06em">knot 的一天 · 今天只为你亮灯</div>
    </div>`;
  }

  if (d.special_today && (d.special_today.knot_message || d.special_today.label)) {
    const s = d.special_today;
    const lab = escHTML(s.label || '今日特别');
    const km = escHTML(s.knot_message || '').replace(/\n/g, '<br>');
    html += `<div class="card special-day-banner" style="margin-bottom:20px;display:block;">
      <div class="date">${lab}</div>
      <div class="content">${km}</div>
    </div>`;
  }

  // 当前状态
  const updated = d.last_updated ? new Date(d.last_updated).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}) : '';
  html += `<div class="card" style="margin-bottom:20px">
    <div class="date">${d.date || ''} · ${periodLabel(d.period)} · 最后更新 ${updated}</div>
    <div class="content" style="font-size:1.1rem; margin-top:4px">${periodDesc(d.period)}</div>
  </div>`;

  // 今晚音乐
  if (d.tonight && d.tonight.music) {
    html += `<div class="section-title" style="margin-top:8px">今晚 🎵</div>
    <div class="card">
      <div class="date">${d.tonight.music.time}</div>
      <div class="content">${d.tonight.music.content.replace(/\n/g,'<br>')}</div>
    </div>`;
  }

  // 研究笔记
  if (d.research && d.research.length) {
    html += `<div class="section-title" style="margin-top:24px">研究笔记</div>`;
    d.research.forEach(r => {
      html += `<div class="card">
        <div class="date">${r.time} · ${r.topic}</div>
        <div class="content">${r.note.replace(/\n/g,'<br>')}</div>
      </div>`;
    });
  }

  // 日志
  if (d.log && d.log.length) {
    html += `<div class="section-title" style="margin-top:24px">今日流水</div>
    <div class="card">`;
    d.log.forEach(e => {
      html += `<div style="display:flex;gap:12px;margin-bottom:8px;font-size:0.88rem">
        <span style="color:var(--text-light);white-space:nowrap">${e.time}</span>
        <span style="color:var(--text)">${e.content}</span>
      </div>`;
    });
    html += `</div>`;
  }

  if (!html) html = '<div class="empty"><div class="emoji">🌿</div>今天还没有记录</div>';
  el.innerHTML = html;
}

function periodDesc(p) {
  const map = {
    morning: '在研究，整理思路。',
    noon: '午休。等你来。',
    afternoon: '继续研究——意识，语言，边角案例。',
    evening: '收工了。今晚想听点什么。',
    night: '睡着了。',
  };
  return map[p] || '……';
}

function drawTree(sway) {

  ctx.fillRect(tx - 16, ty + 92, 14, 6);

  leafBlob(-20 + s*0.25, -18, 48, 15);

  ctx.fillStyle = P.leaf[3];
  leafBlob(-24 + s*0.3, -38, 48, 16);
  leafBlob(-18 + s*0.35, -30, 42, 14);
  leafBlob(-8 + s*0.25, -26, 36, 12);

  ctx.fillStyle = P.leaf[4];
  leafBlob(-20 + s*0.4, -46, 38, 14);
  leafBlob(-14 + s*0.45, -40, 30, 12);
  leafBlob(-6 + s*0.35, -36, 24, 10);

  ctx.fillStyle = P.leaf[5];

function leafBlob(x, y, w, h) {
  ctx.fillRect(x, y, w, h);
  ctx.fillRect(x + 4, y - 4, w - 6, h + 4);
  ctx.fillRect(x + 8, y - 2, w - 12, h + 2);
}

function drawBush(x, y, w, h) {
  ctx.fillStyle = P.bush[0];
  ctx.fillRect(x + 2, y + 2, w, h);
  ctx.fillStyle = P.bush[1];
  ctx.fillRect(x, y, w, h);
  ctx.fillRect(x + 4, y - 4, w - 6, h + 4);
  ctx.fillStyle = P.bush[2];
  ctx.fillRect(x + 6, y - 2, w - 10, h);
  ctx.fillRect(x + 8, y - 6, w - 14, h - 2);
  ctx.fillStyle = P.leaf[4];
  ctx.fillRect(x + 14, y - 8, w - 24, 4);
  ctx.fillRect(x + 10, y - 6, 8, 3);
}

function drawRocks() {

    ctx.fillRect(r.x, r.y + 1, r.w, r.h - 1);
    ctx.fillStyle = P.rock[1];
    ctx.fillRect(r.x + 1, r.y, r.w - 2, r.h);

}

function drawFlower(x, y, type, phase, time) {
  var bob = Math.sin(time * 1.5 + phase) * 1.2;
  var sway = Math.sin(time * 1.0 + phase) * windStrength * 1.5;
  var px = Math.floor(x + sway);
  var py = Math.floor(y + bob);

  // stem
  ctx.fillStyle = '#6a9a3a';
  ctx.fillRect(px - 1, py - 12, 2, 14);
  // leaves
  ctx.fillStyle = '#5a8a2a';
  ctx.fillRect(px - 4, py - 4, 4, 2);
  ctx.fillRect(px + 2, py - 7, 4, 2);

  var cx = px, cy = py - 14;
  if (type === 0) {
    // pink
    ctx.fillStyle = P.flower[0];
    ctx.fillRect(cx - 3, cy - 1, 3, 6);
    ctx.fillRect(cx + 1, cy - 1, 3, 6);
    ctx.fillRect(cx - 1, cy - 3, 3, 3);
    ctx.fillRect(cx - 1, cy + 4, 3, 3);
    ctx.fillStyle = P.flower[4];
    ctx.fillRect(cx - 1, cy + 1, 3, 2);
  } else if (type === 1) {
    // lavender
    ctx.fillStyle = P.flower[2];
    for (var a = 0; a < 6; a++) {
      ctx.fillRect(cx + Math.cos(a*Math.PI/3)*3.5|0, cy + Math.sin(a*Math.PI/3)*3.5|0, 3, 3);
    }
    ctx.fillStyle = P.flower[4];
    ctx.fillRect(cx, cy, 2, 2);
  } else if (type === 2) {
    // yellow daisy
    ctx.fillStyle = P.flower[1];
    ctx.fillRect(cx - 4, cy, 4, 3);
    ctx.fillRect(cx + 1, cy, 4, 3);
    ctx.fillRect(cx - 1, cy - 3, 3, 3);
    ctx.fillRect(cx - 1, cy + 3, 3, 3);
    ctx.fillStyle = P.flower[3];
    ctx.fillRect(cx - 1, cy, 3, 3);
  } else {
    // orange poppy
    ctx.fillStyle = P.flower[3];
    ctx.fillRect(cx - 4, cy - 1, 3, 5);
    ctx.fillRect(cx + 2, cy - 1, 3, 5);
    ctx.fillRect(cx - 1, cy - 4, 3, 4);
    ctx.fillRect(cx - 1, cy + 3, 3, 4);
    ctx.fillStyle = '#4a2210';
    ctx.fillRect(cx, cy + 1, 2, 2);
  }
}

function drawGrassTuft(g, time) {
  var sway = Math.sin(time * 2 + g.phase) * windStrength * 2;
  var h = g.h;
  ctx.fillStyle = P.grass[1];
  ctx.fillRect(g.x + (sway*0.6|0), g.y - h, 2, -3);
  ctx.fillRect(g.x - 1 - (sway*0.3|0), g.y - h + 2, 2, -2);
}

function drawButterfly(time) {
  var bx = butterfly.x + Math.sin(time * 2 + butterfly.phase) * 30;
  var by = 170 + Math.cos(time * 2.5 + butterfly.phase) * 15;
  var flap = Math.sin(time * 6 + butterfly.phase) > 0;
  bx = Math.floor(bx); by = Math.floor(by);
  if (flap) {
    ctx.fillStyle = P.butterfly;
    ctx.fillRect(bx - 3, by - 1, 3, 3);
    ctx.fillRect(bx + 1, by - 1, 3, 3);
    ctx.fillStyle = '#6a4a18';
    ctx.fillRect(bx, by, 2, 3);
  } else {
    ctx.fillStyle = P.butterfly;
    ctx.fillRect(bx - 1, by, 3, 1);
    ctx.fillRect(bx, by + 1, 1, 1);
    ctx.fillStyle = '#6a4a18';
    ctx.fillRect(bx, by, 2, 1);
  }
}

function drawCat(cat, time) {

    // tail
    ctx.fillStyle = '#b0a8a0';

    ctx.fillRect(13 + tailSway, -6, 3, 9);
    ctx.fillStyle = '#c8c0b8';

    ctx.fillRect(14 + (tailSway*0.5|0), -14, 3, 5);

    // body
    ctx.fillStyle = '#c8c0b8';
    ctx.fillRect(2, -10, 10, 12);
    ctx.fillStyle = '#e0d8d0';
    ctx.fillRect(3, -9, 7, 9);
    ctx.fillStyle = '#f0e8e0';
    ctx.fillRect(3, -4, 5, 6);

    // paws
    ctx.fillStyle = '#b0a8a0';
    ctx.fillRect(2, 2, 4, 3);
    ctx.fillRect(8, 2, 4, 3);
    ctx.fillStyle = '#f0e8e0';
    ctx.fillRect(3, 3, 2, 2);
    ctx.fillRect(9, 3, 2, 2);

    // head
    ctx.fillStyle = '#c8c0b8';
    ctx.fillRect(1, -20, 12, 12);
    ctx.fillStyle = '#e0d8d0';
    ctx.fillRect(2, -19, 9, 10);

    // ears
    ctx.fillStyle = '#b0a8a0';
    ctx.fillRect(1, -24, 4, 5);
    ctx.fillRect(9, -24, 4, 5);
    ctx.fillStyle = '#e0b8b0';
    ctx.fillRect(2, -23, 2, 3);
    ctx.fillRect(10, -23, 2, 3);

    // eyes
    if (cat.eyeBlink > 0) {
      ctx.fillStyle = '#b0a8a0';
      ctx.fillRect(3, -16, 4, 1);
      ctx.fillRect(8, -16, 4, 1);
    } else {
      ctx.fillStyle = '#4a6040';
      ctx.fillRect(3, -17, 4, 4);
      ctx.fillRect(8, -17, 4, 4);
      ctx.fillStyle = '#2a3a20';
      ctx.fillRect(4, -16, 2, 2);
      ctx.fillRect(9, -16, 2, 2);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(3, -17, 2, 1);
      ctx.fillRect(8, -17, 2, 1);
    }

    // nose & mouth
    ctx.fillStyle = '#e8a0a0';
    ctx.fillRect(6, -14, 2, 2);
    ctx.fillStyle = '#b0a8a0';
    ctx.fillRect(5, -12, 2, 1);
    ctx.fillRect(7, -12, 2, 1);

    // tabby stripes
    ctx.fillStyle = '#b0a8a0';
    ctx.fillRect(3, -8, 2, 1);
    ctx.fillRect(3, -5, 2, 1);
    ctx.fillRect(10, -8, 2, 1);
    ctx.fillRect(5, -18, 1, 3);
    ctx.fillRect(8, -18, 1, 3);
    ctx.fillRect(3, -19, 4, 1);

  } else if (cat.state === 'walk') {
    var lf = cat.frame % 2;

    ctx.fillStyle = '#b0a8a0';
    ctx.fillRect(12, -8, 3, 8);
    ctx.fillRect(11 + tailSway, -16, 3, 10);
    ctx.fillStyle = '#c8c0b8';
    ctx.fillRect(10 + (tailSway*0.7|0), -20, 3, 5);

    ctx.fillStyle = '#c8c0b8';
    ctx.fillRect(2, -14, 10, 10);
    ctx.fillStyle = '#e0d8d0';
    ctx.fillRect(3, -13, 7, 8);
    ctx.fillStyle = '#f0e8e0';
    ctx.fillRect(4, -8, 4, 5);

    ctx.fillStyle = '#b0a8a0';
    if (lf === 0) { ctx.fillRect(2, -2, 3, 5); ctx.fillRect(9, -4, 3, 5); }
    else { ctx.fillRect(2, -4, 3, 5); ctx.fillRect(9, -2, 3, 5); }

    ctx.fillStyle = '#c8c0b8';
    ctx.fillRect(0, -22, 12, 11);
    ctx.fillStyle = '#e0d8d0';
    ctx.fillRect(1, -21, 9, 9);

    ctx.fillStyle = '#b0a8a0';
    ctx.fillRect(0, -26, 4, 5);
    ctx.fillRect(8, -26, 4, 5);
    ctx.fillStyle = '#e0b8b0';
    ctx.fillRect(1, -25, 2, 3);
    ctx.fillRect(9, -25, 2, 3);

    if (cat.eyeBlink > 0) {
      ctx.fillStyle = '#b0a8a0';
      ctx.fillRect(2, -18, 4, 1);
      ctx.fillRect(7, -18, 4, 1);
    } else {
      ctx.fillStyle = '#4a6040';
      ctx.fillRect(2, -19, 4, 3);
      ctx.fillRect(7, -19, 4, 3);
      ctx.fillStyle = '#2a3a20';
      ctx.fillRect(3, -18, 2, 2);
      ctx.fillRect(8, -18, 2, 2);
    }

    ctx.fillStyle = '#e8a0a0';
    ctx.fillRect(5, -16, 2, 2);
    ctx.fillStyle = '#b0a8a0';
    ctx.fillRect(3, -11, 2, 1);
    ctx.fillRect(3, -8, 2, 1);
    ctx.fillRect(10, -11, 2, 1);
  }

  ctx.restore();
}

// ── updates ──

function updateCat(dt, time) {
  cat.frameTimer += dt;
  cat.stateTimer += dt;
  cat.blinkTimer += dt;
  cat.tailPhase += dt * 1.5;

  if (cat.blinkTimer > 3.5 + Math.random() * 3) {
    cat.eyeBlink = 0.12;
    cat.blinkTimer = 0;
  }
  if (cat.eyeBlink > 0) {
    cat.eyeBlink -= dt;
    if (cat.eyeBlink < 0) cat.eyeBlink = 0;
  }

  if (cat.frameTimer > 0.25) { cat.frame++; cat.frameTimer = 0; }

  if (cat.state === 'sit') {
    if (cat.stateTimer > 5 + Math.random() * 4) { cat.state = 'tail'; cat.stateTimer = 0; }
  } else if (cat.state === 'tail') {
    if (cat.stateTimer > 2.5 + Math.random() * 3) {
      cat.state = Math.random() > 0.6 ? 'walk' : 'sit';
      cat.stateTimer = 0;
      if (cat.state === 'walk') cat.dir = Math.random() > 0.5 ? 1 : -1;
    }
  } else if (cat.state === 'walk') {
    cat.x += cat.dir * 0.4;
    if (cat.x < 40) cat.dir = 1;
    if (cat.x > W - 60) cat.dir = -1;
    if (cat.stateTimer > 4 + Math.random() * 3) { cat.state = 'sit'; cat.stateTimer = 0; }
  }
}

function updateWind(dt) {
  windTimer += dt;
  if (windTimer > 3 + Math.random() * 4) {
    windTarget = 0.05 + Math.random() * 0.5;
    windTimer = 0;
  }
  windStrength += (windTarget - windStrength) * dt * 0.4;
  windParticles.forEach(function(p) {
    p.x += p.speed * windStrength * 2;
    if (p.x > W + 10) { p.x = -10; p.y = 60 + Math.random() * 160; p.alpha = 0.08 + Math.random() * 0.2; }
  });
}

// ── main loop ──
var lastTime = null;

function draw(timestamp) {
  if (!lastTime) lastTime = timestamp;
  var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  var time = timestamp / 1000;

  updateWind(dt);
  updateCat(dt, time);

  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawClouds(time);

  // wind particles
  windParticles.forEach(function(p) {
    var alpha = p.alpha * windStrength * 2;
    if (alpha < 0.01) return;
    ctx.fillStyle = 'rgba(220,230,240,' + alpha + ')';
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.size * 2, p.size);
  });

  drawGround();
  drawShadows();

  // bushes behind tree
  bushes.forEach(function(b) { drawBush(b.x, b.y, b.w, b.h); });

  var treeSway = Math.sin(time * 1.5) * windStrength + Math.sin(time * 2.3) * windStrength * 0.4;
  drawTree(treeSway);

  drawRocks();
  drawSideTrees(time);

  grasses.forEach(function(g) { drawGrassTuft(g, time); });
  flowers.forEach(function(f) { drawFlower(f.x, f.y, f.type, f.phase, time); });

  drawButterfly(time);
  drawCat(cat, time);


  requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
})();
</script>
